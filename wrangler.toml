name = "cloudbrain"
main = "src/index.ts"
compatibility_date = "2024-01-10"
compatibility_flags = ["nodejs_compat"]

# KV Namespace Binding
# Bind your KV namespace in Cloudflare Dashboard:
# 1. Go to Workers → CloudBrain → Settings → Bindings
# 2. Add KV Namespace binding with:
#    - Variable name: SECRETS
#    - KV Namespace: cloudbrain (or your namespace name)
# 3. No need to edit this file - binding is done in dashboard
#
# For local development, you can add:
# [[kv_namespaces]]
# binding = "SECRETS"
# id = "your-namespace-id"
# preview_id = "your-preview-id"

[ai]
binding = "AI"

# Observability - Enable live logs
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
