name = "cloudbrain"
main = "src/index.ts"
compatibility_date = "2024-01-10"
compatibility_flags = ["nodejs_compat"]

# AI binding only
[ai]
binding = "AI"

# Environment variables are loaded from .env file
# Create .env file by copying .env.example and filling in your credentials
# The .env file is in .gitignore - your credentials stay private!
[env.production]
vars = { TELEGRAM_BOT_TOKEN = "", TELEGRAM_OWNER_ID = "", CLOUDFLARE_API_TOKEN = "", CLOUDFLARE_ACCOUNT_ID = "" }

[env.development]
vars = { TELEGRAM_BOT_TOKEN = "", TELEGRAM_OWNER_ID = "", CLOUDFLARE_API_TOKEN = "", CLOUDFLARE_ACCOUNT_ID = "" }

# Triggers for scheduled automations
[[triggers.crons]]
crons = ["0 * * * *"]
