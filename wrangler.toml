name = "cloudbrain"
main = "src/index.ts"
compatibility_date = "2024-01-10"
compatibility_flags = ["nodejs_compat"]

# AI binding only
[ai]
binding = "AI"

# Development environment (uses .env file)
[env.development]
vars = { TELEGRAM_BOT_TOKEN = "", TELEGRAM_OWNER_ID = "", CLOUDFLARE_API_TOKEN = "", CLOUDFLARE_ACCOUNT_ID = "" }

# Production environment (uses Cloudflare dashboard variables)
# Set variables directly in Cloudflare Workers dashboard: Settings → Variables
[env.production]
# No vars here - they come from the dashboard
